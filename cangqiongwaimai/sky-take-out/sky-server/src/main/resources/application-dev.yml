sky:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    host: localhost
    port: 3306
    database: sky_take_out
    username: root
    password: root
  alioss:
    endpoint: oss-cn-hangzhou.aliyuncs.com
    access-key-id: YOUR_OSS_KEY_ID
    access-key-secret: YOUR_OSS_KEY_SECRET
    bucket-name: your-bucket-name
  redis:
    host: localhost
    port: 6379
    password: your_redis_password
    database: 10
  wechat:
    appid: your_wechat_appid
    secret: your_wechat_secret
    mchid: your_mchid
    mchSerialNo: your_mch_serial_no
    privateKeyFilePath: /path/to/apiclient_key.pem
    apiV3Key: your_api_v3_key
    weChatPayCertFilePath: /path/to/wechatpay_cert.pem
    notifyUrl: https://your-domain.com/wxpay/notify
    refundNotifyUrl: https://your-domain.com/wxpay/refund
