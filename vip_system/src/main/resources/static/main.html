<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VIP会员管理系统</title>
  <link rel="stylesheet" href="lib/element-plus.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <div class="app-wrapper" v-if="user.userId">
      <!-- ========== 侧边栏 ========== -->
      <aside class="sidebar">
        <div class="sidebar-logo">
          <h3>VIP管理系统</h3>
        </div>
        <nav class="sidebar-menu">
          <div class="menu-item" :class="{ active: currentMenu === 'member' }" @click="switchMenu('member')">
            <span class="icon">👤</span> 会员管理
          </div>
          <div class="menu-item" :class="{ active: currentMenu === 'goods' }" @click="switchMenu('goods')">
            <span class="icon">📦</span> 商品管理
          </div>
          <div class="menu-item" :class="{ active: currentMenu === 'staff' }" @click="switchMenu('staff')">
            <span class="icon">👥</span> 员工管理
          </div>
          <div class="menu-item" :class="{ active: currentMenu === 'supplier' }" @click="switchMenu('supplier')">
            <span class="icon">🏭</span> 供应商管理
          </div>
        </nav>
      </aside>

      <!-- ========== 主体区域 ========== -->
      <div class="main-area">
        <!-- 顶部栏 -->
        <header class="header">
          <div class="header-left">
            <div class="breadcrumb">
              <span>首页</span>
              <span class="separator">/</span>
              <span class="current">{{ menuTitle }}</span>
            </div>
          </div>
          <div class="header-right">
            <span class="username">{{ user.name }}（{{ user.username }}）</span>
            <el-button plain size="small" @click="openPwdDialog">修改密码</el-button>
            <el-button plain size="small" type="danger" @click="handleLogout">退出登录</el-button>
          </div>
        </header>

        <!-- 内容区 -->
        <section class="content">
          <!-- ===== 会员管理 ===== -->
          <div class="content-card" v-show="currentMenu === 'member'">
            <div class="search-bar">
              <el-input v-model="memberSearch.name" placeholder="会员姓名" clearable @keyup.enter="handleMemberSearch" />
              <el-input v-model="memberSearch.cardNum" placeholder="卡号" clearable @keyup.enter="handleMemberSearch" />
              <el-select v-model="memberSearch.payType" placeholder="支付类型" clearable @keyup.enter="handleMemberSearch">
                <el-option label="现金" value="1" />
                <el-option label="微信" value="2" />
                <el-option label="支付宝" value="3" />
                <el-option label="银行卡" value="4" />
              </el-select>
              <div class="search-actions">
                <el-button type="primary" @click="handleMemberSearch">搜索</el-button>
                <el-button @click="handleMemberReset">重置</el-button>
              </div>
            </div>
            <div class="table-toolbar">
              <el-button type="primary" @click="openMemberAdd">新增会员</el-button>
            </div>
            <el-table :data="memberTable" border stripe v-loading="memberLoading" style="width:100%">
              <template #empty>
                <el-empty description="暂无会员数据" :image-size="80" />
              </template>
              <el-table-column label="卡号" width="120">
                <template #default="{ row }">{{ row.cardNum }}</template>
              </el-table-column>
              <el-table-column label="姓名" width="100">
                <template #default="{ row }">{{ row.name }}</template>
              </el-table-column>
              <el-table-column label="生日" width="120">
                <template #default="{ row }">{{ formatDate(row.birthday) }}</template>
              </el-table-column>
              <el-table-column label="手机号" width="130">
                <template #default="{ row }">{{ row.phone }}</template>
              </el-table-column>
              <el-table-column label="积分" width="80" align="right">
                <template #default="{ row }">{{ row.integral != null ? row.integral : '' }}</template>
              </el-table-column>
              <el-table-column label="余额" width="110" align="right">
                <template #default="{ row }">
                  <span class="amount-cell">{{ row.money != null ? Number(row.money).toFixed(2) : '' }}</span>
                </template>
              </el-table-column>
              <el-table-column label="支付类型" width="90">
                <template #default="{ row }">{{ payTypeLabel(row.payType) }}</template>
              </el-table-column>
              <el-table-column label="地址" min-width="150" show-overflow-tooltip>
                <template #default="{ row }">{{ row.address }}</template>
              </el-table-column>
              <el-table-column label="操作" width="140" fixed="right">
                <template #default="{ row }">
                  <el-button link type="primary" size="small" @click="openMemberEdit(row)">编辑</el-button>
                  <el-button link type="danger" size="small" @click="handleMemberDelete(row)">删除</el-button>
                </template>
              </el-table-column>
            </el-table>
            <div class="pagination-container">
              <el-pagination
                v-model:current-page="memberPage.current"
                v-model:page-size="memberPage.size"
                :total="memberPage.total"
                :page-sizes="[5,10,20,50]"
                layout="total,sizes,prev,pager,next,jumper"
                @size-change="() => { memberPage.current = 1; loadMemberList(); }"
                @current-change="loadMemberList"
              />
            </div>
          </div>

          <!-- ===== 商品管理 ===== -->
          <div class="content-card" v-show="currentMenu === 'goods'">
            <div class="search-bar">
              <el-input v-model="goodsSearch.name" placeholder="商品名称" clearable @keyup.enter="handleGoodsSearch" />
              <el-input v-model="goodsSearch.code" placeholder="商品编码" clearable @keyup.enter="handleGoodsSearch" />
              <div class="search-actions">
                <el-button type="primary" @click="handleGoodsSearch">搜索</el-button>
                <el-button @click="handleGoodsReset">重置</el-button>
              </div>
            </div>
            <div class="table-toolbar">
              <el-button type="primary" @click="openGoodsAdd">新增商品</el-button>
            </div>
            <el-table :data="goodsTable" border stripe v-loading="goodsLoading" style="width:100%">
              <template #empty>
                <el-empty description="暂无商品数据" :image-size="80" />
              </template>
              <el-table-column label="商品编码" width="120">
                <template #default="{ row }">{{ row.code }}</template>
              </el-table-column>
              <el-table-column label="名称" width="140" show-overflow-tooltip>
                <template #default="{ row }">{{ row.name }}</template>
              </el-table-column>
              <el-table-column label="规格" width="120">
                <template #default="{ row }">{{ row.spec }}</template>
              </el-table-column>
              <el-table-column label="零售价" width="100" align="right">
                <template #default="{ row }">
                  <span class="amount-cell">{{ row.retailPrice != null ? Number(row.retailPrice).toFixed(2) : '' }}</span>
                </template>
              </el-table-column>
              <el-table-column label="进货价" width="100" align="right">
                <template #default="{ row }">
                  <span class="amount-cell">{{ row.purchasePrice != null ? Number(row.purchasePrice).toFixed(2) : '' }}</span>
                </template>
              </el-table-column>
              <el-table-column label="库存" width="80" align="right">
                <template #default="{ row }">{{ row.storageNum != null ? row.storageNum : '' }}</template>
              </el-table-column>
              <el-table-column label="供应商" width="140" show-overflow-tooltip>
                <template #default="{ row }">{{ row.supplierName }}</template>
              </el-table-column>
              <el-table-column label="操作" width="140" fixed="right">
                <template #default="{ row }">
                  <el-button link type="primary" size="small" @click="openGoodsEdit(row)">编辑</el-button>
                  <el-button link type="danger" size="small" @click="handleGoodsDelete(row)">删除</el-button>
                </template>
              </el-table-column>
            </el-table>
            <div class="pagination-container">
              <el-pagination
                v-model:current-page="goodsPage.current"
                v-model:page-size="goodsPage.size"
                :total="goodsPage.total"
                :page-sizes="[5,10,20,50]"
                layout="total,sizes,prev,pager,next,jumper"
                @size-change="() => { goodsPage.current = 1; loadGoodsList(); }"
                @current-change="loadGoodsList"
              />
            </div>
          </div>

          <!-- ===== 员工管理 ===== -->
          <div class="content-card" v-show="currentMenu === 'staff'">
            <div class="search-bar">
              <el-input v-model="staffSearch.name" placeholder="姓名" clearable @keyup.enter="handleStaffSearch" />
              <el-input v-model="staffSearch.username" placeholder="账号" clearable @keyup.enter="handleStaffSearch" />
              <div class="search-actions">
                <el-button type="primary" @click="handleStaffSearch">搜索</el-button>
                <el-button @click="handleStaffReset">重置</el-button>
              </div>
            </div>
            <div class="table-toolbar">
              <el-button type="primary" @click="openStaffAdd">新增员工</el-button>
            </div>
            <el-table :data="staffTable" border stripe v-loading="staffLoading" style="width:100%">
              <template #empty>
                <el-empty description="暂无员工数据" :image-size="80" />
              </template>
              <el-table-column label="账号" width="120">
                <template #default="{ row }">{{ row.username }}</template>
              </el-table-column>
              <el-table-column label="姓名" width="100">
                <template #default="{ row }">{{ row.name }}</template>
              </el-table-column>
              <el-table-column label="年龄" width="80" align="right">
                <template #default="{ row }">{{ row.age != null ? row.age : '' }}</template>
              </el-table-column>
              <el-table-column label="电话" width="130">
                <template #default="{ row }">{{ row.mobile }}</template>
              </el-table-column>
              <el-table-column label="薪酬" width="110" align="right">
                <template #default="{ row }">
                  <span class="amount-cell">{{ row.salary != null ? Number(row.salary).toFixed(2) : '' }}</span>
                </template>
              </el-table-column>
              <el-table-column label="入职时间" width="120">
                <template #default="{ row }">{{ formatDate(row.entryDate) }}</template>
              </el-table-column>
              <el-table-column label="操作" width="140" fixed="right">
                <template #default="{ row }">
                  <el-button link type="primary" size="small" @click="openStaffEdit(row)">编辑</el-button>
                  <el-button link type="danger" size="small" @click="handleStaffDelete(row)">删除</el-button>
                </template>
              </el-table-column>
            </el-table>
            <div class="pagination-container">
              <el-pagination
                v-model:current-page="staffPage.current"
                v-model:page-size="staffPage.size"
                :total="staffPage.total"
                :page-sizes="[5,10,20,50]"
                layout="total,sizes,prev,pager,next,jumper"
                @size-change="() => { staffPage.current = 1; loadStaffList(); }"
                @current-change="loadStaffList"
              />
            </div>
          </div>

          <!-- ===== 供应商管理 ===== -->
          <div class="content-card" v-show="currentMenu === 'supplier'">
            <div class="search-bar">
              <el-input v-model="supplierSearch.name" placeholder="供应商名称" clearable @keyup.enter="handleSupplierSearch" />
              <el-input v-model="supplierSearch.linkman" placeholder="联系人" clearable @keyup.enter="handleSupplierSearch" />
              <div class="search-actions">
                <el-button type="primary" @click="handleSupplierSearch">搜索</el-button>
                <el-button @click="handleSupplierReset">重置</el-button>
              </div>
            </div>
            <div class="table-toolbar">
              <el-button type="primary" @click="openSupplierAdd">新增供应商</el-button>
            </div>
            <el-table :data="supplierTable" border stripe v-loading="supplierLoading" style="width:100%">
              <template #empty>
                <el-empty description="暂无供应商数据" :image-size="80" />
              </template>
              <el-table-column label="名称" width="160" show-overflow-tooltip>
                <template #default="{ row }">{{ row.name }}</template>
              </el-table-column>
              <el-table-column label="联系人" width="120">
                <template #default="{ row }">{{ row.linkman }}</template>
              </el-table-column>
              <el-table-column label="电话" width="130">
                <template #default="{ row }">{{ row.mobile }}</template>
              </el-table-column>
              <el-table-column label="备注" min-width="200" show-overflow-tooltip>
                <template #default="{ row }">{{ row.remark }}</template>
              </el-table-column>
              <el-table-column label="操作" width="140" fixed="right">
                <template #default="{ row }">
                  <el-button link type="primary" size="small" @click="openSupplierEdit(row)">编辑</el-button>
                  <el-button link type="danger" size="small" @click="handleSupplierDelete(row)">删除</el-button>
                </template>
              </el-table-column>
            </el-table>
            <div class="pagination-container">
              <el-pagination
                v-model:current-page="supplierPage.current"
                v-model:page-size="supplierPage.size"
                :total="supplierPage.total"
                :page-sizes="[5,10,20,50]"
                layout="total,sizes,prev,pager,next,jumper"
                @size-change="() => { supplierPage.current = 1; loadSupplierList(); }"
                @current-change="loadSupplierList"
              />
            </div>
          </div>
        </section>
      </div>
    </div>

    <!-- ========== 修改密码弹窗 ========== -->
    <el-dialog v-model="pwdDialogVisible" title="修改密码" width="480px" :close-on-click-modal="false" @closed="resetPwdForm">
      <el-form ref="pwdFormRef" :model="pwdForm" :rules="pwdRules" label-width="90px">
        <el-form-item label="原密码" prop="oldPassword">
          <el-input v-model="pwdForm.oldPassword" type="password" show-password placeholder="请输入原密码" />
        </el-form-item>
        <el-form-item label="新密码" prop="newPassword">
          <el-input v-model="pwdForm.newPassword" type="password" show-password placeholder="请输入新密码" />
        </el-form-item>
        <el-form-item label="确认密码" prop="confirmPassword">
          <el-input v-model="pwdForm.confirmPassword" type="password" show-password placeholder="请再次输入新密码" />
        </el-form-item>
      </el-form>
      <template #footer>
        <el-button @click="pwdDialogVisible = false">取消</el-button>
        <el-button type="primary" :loading="pwdLoading" @click="handleChangePassword">确定</el-button>
      </template>
    </el-dialog>

    <!-- ========== 会员弹窗 ========== -->
    <el-dialog v-model="memberDialogVisible" :title="memberDialogTitle" width="520px" :close-on-click-modal="false" @closed="resetMemberForm">
      <el-form ref="memberFormRef" :model="memberForm" :rules="memberRules" label-width="80px">
        <el-form-item label="卡号" prop="cardNum">
          <el-input v-model="memberForm.cardNum" placeholder="请输入卡号" maxlength="32" />
        </el-form-item>
        <el-form-item label="姓名" prop="name">
          <el-input v-model="memberForm.name" placeholder="请输入姓名" maxlength="20" />
        </el-form-item>
        <el-form-item label="生日">
          <el-date-picker v-model="memberForm.birthday" type="date" value-format="YYYY-MM-DD" placeholder="选择生日" style="width:100%" :disabled-date="disabledFutureDate" />
        </el-form-item>
        <el-form-item label="手机号" prop="phone">
          <el-input v-model="memberForm.phone" placeholder="请输入手机号" maxlength="11" />
        </el-form-item>
        <el-form-item label="积分" prop="integral">
          <el-input-number v-model="memberForm.integral" :min="0" :precision="0" :controls="true" style="width:100%" />
        </el-form-item>
        <el-form-item label="余额">
          <el-input-number v-model="memberForm.money" :min="0" :precision="2" :controls="true" style="width:100%" />
        </el-form-item>
        <el-form-item label="支付类型" prop="payType">
          <el-select v-model="memberForm.payType" placeholder="请选择支付类型" style="width:100%">
            <el-option label="现金" value="1" />
            <el-option label="微信" value="2" />
            <el-option label="支付宝" value="3" />
            <el-option label="银行卡" value="4" />
          </el-select>
        </el-form-item>
        <el-form-item label="地址">
          <el-input v-model="memberForm.address" placeholder="请输入地址" maxlength="100" />
        </el-form-item>
      </el-form>
      <template #footer>
        <el-button @click="memberDialogVisible = false">取消</el-button>
        <el-button type="primary" :loading="memberSaving" @click="handleSaveMember">确定</el-button>
      </template>
    </el-dialog>

    <!-- ========== 商品弹窗 ========== -->
    <el-dialog v-model="goodsDialogVisible" :title="goodsDialogTitle" width="520px" :close-on-click-modal="false" @closed="resetGoodsForm" @opened="loadSupplierOptions">
      <el-form ref="goodsFormRef" :model="goodsForm" :rules="goodsRules" label-width="80px">
        <el-form-item label="商品编码" prop="code">
          <el-input v-model="goodsForm.code" placeholder="请输入商品编码" maxlength="32" />
        </el-form-item>
        <el-form-item label="名称" prop="name">
          <el-input v-model="goodsForm.name" placeholder="请输入商品名称" maxlength="50" />
        </el-form-item>
        <el-form-item label="规格">
          <el-input v-model="goodsForm.spec" placeholder="请输入规格" maxlength="50" />
        </el-form-item>
        <el-form-item label="零售价" prop="retailPrice">
          <el-input-number v-model="goodsForm.retailPrice" :min="0" :precision="2" :controls="true" style="width:100%" />
        </el-form-item>
        <el-form-item label="进货价">
          <el-input-number v-model="goodsForm.purchasePrice" :min="0" :precision="2" :controls="true" style="width:100%" />
        </el-form-item>
        <el-form-item label="库存" prop="storageNum">
          <el-input-number v-model="goodsForm.storageNum" :min="0" :precision="0" :controls="true" style="width:100%" />
        </el-form-item>
        <el-form-item label="供应商" prop="supplierId">
          <el-select v-model="goodsForm.supplierId" placeholder="请选择供应商" style="width:100%">
            <el-option v-for="s in supplierOptions" :key="s.id" :label="s.name" :value="s.id" />
          </el-select>
        </el-form-item>
      </el-form>
      <template #footer>
        <el-button @click="goodsDialogVisible = false">取消</el-button>
        <el-button type="primary" :loading="goodsSaving" @click="handleSaveGoods">确定</el-button>
      </template>
    </el-dialog>

    <!-- ========== 员工弹窗 ========== -->
    <el-dialog v-model="staffDialogVisible" :title="staffDialogTitle" width="520px" :close-on-click-modal="false" @closed="resetStaffForm">
      <el-form ref="staffFormRef" :model="staffForm" :rules="staffRules" label-width="80px">
        <el-form-item label="账号" prop="username">
          <el-input v-model="staffForm.username" placeholder="请输入账号" :disabled="!isStaffAdd" maxlength="20" />
        </el-form-item>
        <el-form-item label="密码" :prop="isStaffAdd ? 'password' : ''">
          <el-input v-model="staffForm.password" type="password" show-password :placeholder="isStaffAdd ? '请输入密码' : '留空则不修改密码'" maxlength="20" />
        </el-form-item>
        <el-form-item label="姓名" prop="name">
          <el-input v-model="staffForm.name" placeholder="请输入姓名" maxlength="20" />
        </el-form-item>
        <el-form-item label="年龄" prop="age">
          <el-input-number v-model="staffForm.age" :min="0" :max="150" :precision="0" :controls="true" style="width:100%" />
        </el-form-item>
        <el-form-item label="电话">
          <el-input v-model="staffForm.mobile" placeholder="请输入电话" maxlength="11" />
        </el-form-item>
        <el-form-item label="薪酬">
          <el-input-number v-model="staffForm.salary" :min="0" :precision="2" :controls="true" style="width:100%" />
        </el-form-item>
        <el-form-item label="入职时间">
          <el-date-picker v-model="staffForm.entryDate" type="date" value-format="YYYY-MM-DD" placeholder="选择入职时间" style="width:100%" />
        </el-form-item>
      </el-form>
      <template #footer>
        <el-button @click="staffDialogVisible = false">取消</el-button>
        <el-button type="primary" :loading="staffSaving" @click="handleSaveStaff">确定</el-button>
      </template>
    </el-dialog>

    <!-- ========== 供应商弹窗 ========== -->
    <el-dialog v-model="supplierDialogVisible" :title="supplierDialogTitle" width="520px" :close-on-click-modal="false" @closed="resetSupplierForm">
      <el-form ref="supplierFormRef" :model="supplierForm" :rules="supplierRules" label-width="80px">
        <el-form-item label="名称" prop="name">
          <el-input v-model="supplierForm.name" placeholder="请输入供应商名称" maxlength="50" />
        </el-form-item>
        <el-form-item label="联系人" prop="linkman">
          <el-input v-model="supplierForm.linkman" placeholder="请输入联系人" maxlength="20" />
        </el-form-item>
        <el-form-item label="电话" prop="mobile">
          <el-input v-model="supplierForm.mobile" placeholder="请输入电话" maxlength="11" />
        </el-form-item>
        <el-form-item label="备注">
          <el-input v-model="supplierForm.remark" type="textarea" :rows="3" placeholder="请输入备注" maxlength="200" show-word-limit />
        </el-form-item>
      </el-form>
      <template #footer>
        <el-button @click="supplierDialogVisible = false">取消</el-button>
        <el-button type="primary" :loading="supplierSaving" @click="handleSaveSupplier">确定</el-button>
      </template>
    </el-dialog>
  </div>

  <!-- Vue 3 -->
  <script src="lib/vue.global.prod.js"></script>
  <!-- Element Plus -->
  <script src="lib/element-plus.js"></script>
  <!-- Axios -->
  <script src="lib/axios.min.js"></script>
  <!-- API 封装 -->
  <script src="js/api.js"></script>

  <script>
    const { createApp, ref, reactive, computed, nextTick, onMounted, watch } = Vue;
    // ========== 轻量级消息提示（替代ElMessage/ElMessageBox） ==========
    function showToast(msg, type) { type = type || "success";
      var el = document.getElementById('_toast');
      if (!el) {
        el = document.createElement('div');
        el.id = '_toast';
        el.style.cssText = 'position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:9999;padding:10px 24px;border-radius:6px;font-size:14px;color:#fff;pointer-events:none;transition:opacity 0.3s;opacity:0';
        document.body.appendChild(el);
      }
      el.style.background = type === 'success' ? '#67C23A' : type === 'error' ? '#F56C6C' : '#409EFF';
      el.textContent = msg;
